<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>龙脉DEX</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
  <style>
    :root {
      --web3-blue: #4361ee;
      --web3-purple: #7209b7;
      --web3-yellow: #ffd166;
      --web3-dark: #0f172a;
      --web3-card: #1e293b;
      --web3-light: #90e0ef;
      --web3-accent: #4cc9f0;
      --web3-success: #22c55e;
      --web3-warning: #ff6b6b;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      outline: none !important;
    }
    
    body, .app {
      background: var(--web3-dark);
      color: #fff;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(67, 97, 238, 0.15) 0%, transparent 20%),
        radial-gradient(circle at 90% 80%, rgba(114, 9, 183, 0.15) 0%, transparent 20%);
    }
    
    .app {
      max-width: 500px;
      margin: 0 auto;
      padding: 8px;
      position: relative;
      min-height: 100vh;
    }
    
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding: 0 8px;
      position: relative;
    }
    
    @keyframes textGlow {
      0%, 100% {
        background-position: -100% 50%;
      }
      50% {
        background-position: 200% 50%;
      }
    }

    .logo {
      font-size: 42px;
      font-weight: 900;
      background: linear-gradient(90deg, 
        var(--web3-blue), 
        var(--web3-purple), 
        var(--web3-yellow),
        var(--web3-purple),
        var(--web3-blue)
      );
      background-size: 300% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      position: relative;
      display: inline-block;
      animation: textGlow 4s ease-in-out infinite;
      margin-top: 2px;
      overflow: hidden;
    }
    
    .logo::after {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, 
        transparent, 
        rgba(255,255,255,0.8), 
        transparent
      );
      animation: shine 3s ease-in-out infinite;
    }
    
    @keyframes shine {
      0% { left: -100%; }
      50%, 100% { left: 100%; }
    }
    
    .btn {
      background: var(--web3-card);
      border: 1px solid rgba(76, 201, 240, 0.3);
      border-radius: 16px;
      padding: 10px 20px;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      min-width: 120px; 
      width: 120px; 
      flex-shrink: 0;
      display: flex; 
      justify-content: center; 
      align-items: center; 
      box-shadow: none !important;
    }
    
    #langBtn {
      min-width: 40px;
      width: 40px;
      flex-shrink: 0;
    }
    
    .btn:hover {
      background: rgba(76, 201, 240, 0.2);
      border-color: var(--web3-accent);
      transform: translateY(-2px);
      box-shadow: none !important;
    }
    
    .card {
      background: var(--web3-card);
      border-radius: 24px;
      padding: 18px;
      margin-bottom: 12px;
      border: 1px solid rgba(76, 201, 240, 0.2);
      position: relative;
      overflow: hidden;
      box-shadow: none !important;
    }
    
    .card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--web3-accent), transparent);
    }
    
    .swap-container {
      position: relative;
      padding: 10px 0;
    }
    
    .swap-input-group {
      margin-bottom: 10px;
      position: relative;
    }
    
    .token-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px;
      background: rgba(30, 41, 59, 0.5);
      border-radius: 16px;
      border: 1px solid rgba(76, 201, 240, 0.2);
      margin-bottom: 10px;
    }
    
    .token-info {
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
    }
    
    .token-selector {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: rgba(76, 201, 240, 0.1);
      border-radius: 12px;
      cursor: pointer;
      border: 1px solid rgba(76, 201, 240, 0.3);
      min-width: 120px;
      max-width: 140px;
    }
    
    .token-selector:hover {
      background: rgba(76, 201, 240, 0.2);
    }
    
    .token-icon {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--web3-blue), var(--web3-purple));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 14px;
      color: white;
    }
    
    .token-selector-name {
      font-weight: 600;
      color: var(--web3-light);
      font-size: 16px;
    }
    
    .token-selector-arrow {
      color: #94a3b8;
      font-size: 12px;
    }
    
    .balance {
      font-size: 12px;
      color: #94a3b8;
      margin-left: 8px;
    }
    
    .token-input-container {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      min-width: 150px;
    }
    
    .input {
      font-size: 24px;
      background: none;
      border: none;
      color: #fff;
      width: 100%;
      text-align: right;
      font-weight: 600;
      padding: 4px 0;
    }
    
    .input-hint {
      font-size: 12px;
      color: #64748b;
      text-align: right;
      margin-top: 4px;
    }
    
    .swap-btn {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--web3-blue), var(--web3-purple));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      cursor: pointer;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      border: 3px solid var(--web3-dark);
      box-shadow: none !important;
      transition: all 0.3s ease;
    }
    
    .swap-btn:hover {
      transform: translate(-50%, -50%) rotate(180deg);
      box-shadow: none !important;
    }
    
    .percentage-buttons {
      display: flex;
      justify-content: flex-end;
      gap: 6px;
      margin-bottom: 16px;
    }
    
    .percent-btn {
      background: rgba(144, 224, 239, 0.1);
      border: 1px solid rgba(76, 201, 240, 0.3);
      border-radius: 10px;
      padding: 6px 12px;
      color: var(--web3-light);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      min-width: 44px;
      box-shadow: none !important;
    }
    
    .percent-btn:hover {
      background: var(--web3-yellow);
      color: #0f172a;
      border-color: var(--web3-yellow);
      box-shadow: none !important;
    }
    
    .action {
      background: linear-gradient(90deg, var(--web3-blue), var(--web3-purple));
      color: #fff;
      font-weight: 700;
      padding: 16px;
      border: none;
      border-radius: 20px;
      width: 100%;
      font-size: 18px;
      cursor: pointer;
      margin-top: 16px;
      transition: all 0.3s ease;
      box-shadow: none !important;
    }
    
    .action:hover {
      transform: translateY(-2px);
      box-shadow: none !important;
    }
    
    .action:disabled {
      background: #475569;
      color: #94a3b8;
      cursor: not-allowed;
      transform: none;
    }
    
    /* 安全警告样式 */
    .security-warning {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(15, 23, 42, 0.95);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10000;
      font-family: 'Segoe UI', system-ui, sans-serif;
      backdrop-filter: blur(5px);
    }
    
    .security-warning-content {
      background: var(--web3-card);
      padding: 30px;
      border-radius: 20px;
      max-width: 400px;
      text-align: center;
      border: 2px solid var(--web3-warning);
    }
    
    .security-buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 20px;
    }
    
    .security-btn {
      padding: 12px 24px;
      border-radius: 12px;
      font-weight: bold;
      cursor: pointer;
      font-size: 14px;
      border: none;
      transition: all 0.3s ease;
      box-shadow: none !important;
    }
    
    .security-btn.continue {
      background: var(--web3-warning);
      color: #0f172a;
    }
    
    .security-btn.close {
      background: transparent;
      color: var(--web3-light);
      border: 1px solid var(--web3-light);
    }
    
    .security-btn:hover {
      transform: translateY(-2px);
      box-shadow: none !important;
    }

    /* 其他样式保持不变 */
    .asset-card {
      background: linear-gradient(135deg, rgba(67, 97, 238, 0.1), rgba(114, 9, 183, 0.1));
      border-radius: 16px;
      padding: 10px;
      margin-bottom: 12px;
      border: 1px solid rgba(76, 201, 240, 0.3);
      position: relative;
      overflow: hidden;
    }
    
    .details-panel {
      background: rgba(76, 201, 240, 0.05);
      border-radius: 16px;
      padding: 14px;
      margin: 12px 0;
      border: 1px solid rgba(76, 201, 240, 0.2);
    }
    
    .detail-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      font-size: 14px;
      color: #e2e8f0;
    }
    
    .slippage-controls {
      display: flex;
      gap: 6px;
      justify-content: flex-end;
    }
    
    .slip-btn {
      padding: 6px 10px;
      background: #334155;
      border-radius: 12px;
      font-size: 12px;
      cursor: pointer;
      flex: none;
      text-align: center;
      transition: all 0.2s ease;
      border: 1px solid transparent;
      box-shadow: none !important;
    }
    
    .slip-btn.active {
      background: var(--web3-yellow);
      color: #0f172a;
      font-weight: 600;
      border-color: var(--web3-yellow);
    }
    
    .footer {
      text-align: center;
      padding: 20px 0;
      color: #64748b;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="logo">龙脉DEX</div>
      <button class="btn" id="langBtn">EN</button>
      <button class="btn" id="walletBtn">连接钱包</button>
    </div>

    <!-- 选项卡 -->
    <div class="tab-container">
      <div class="tabs">
        <button class="tab-btn active" data-tab="swap">兑换</button>
        <button class="tab-btn" data-tab="liquidity">流动性</button>
      </div>
    </div>

    <!-- 兑换页面 -->
    <div class="tab-content active" id="swapTab">
      <div class="card">
        <div class="percentage-buttons">
          <button class="percent-btn" data-percent="0.1">10%</button>
          <button class="percent-btn" data-percent="0.25">25%</button>
          <button class="percent-btn" data-percent="0.5">50%</button>
          <button class="percent-btn" data-percent="0.75">75%</button>
          <button class="percent-btn" data-percent="1">MAX</button>
        </div>
        
        <div class="swap-container">
          <!-- 从代币输入 -->
          <div class="swap-input-group">
            <div class="token-row">
              <div class="token-info">
                <div class="token-selector" id="fromTokenSelector">
                  <div class="token-icon" id="fromTokenIcon">C</div>
                  <div class="token-selector-name" id="fromTokenName">CFX</div>
                  <span class="token-selector-arrow">▼</span>
                </div>
                <div class="balance">余额: <span id="fromBal">0</span></div>
              </div>
              <div class="token-input-container">
                <input class="input" id="fromAmount" placeholder="0" type="number">
                <div class="input-hint">≈ $0.00</div>
              </div>
            </div>
          </div>

          <button class="swap-btn" id="reverse">⇅</button>

          <!-- 到代币输入 -->
          <div class="swap-input-group">
            <div class="token-row">
              <div class="token-info">
                <div class="token-selector" id="toTokenSelector">
                  <div class="token-icon" id="toTokenIcon">L</div>
                  <div class="token-selector-name" id="toTokenName">LOM</div>
                  <span class="token-selector-arrow">▼</span>
                </div>
                <div class="balance">余额: <span id="toBal">0</span></div>
              </div>
              <div class="token-input-container">
                <div class="input" id="toAmount" style="color:#94a3b8;">0</div>
                <div class="input-hint">≈ $0.00</div>
              </div>
            </div>
          </div>
        </div>

        <!-- 详细信息面板 -->
        <div class="details-panel">
          <div class="detail-item">
            <span class="detail-label">价格</span>
            <span class="detail-value">1 CFX = 0 LOM</span>
          </div>
          
          <div class="detail-item">
            <span class="detail-label">最低收到</span>
            <span class="detail-value">0 LOM</span>
          </div>
          
          <div class="detail-item">
            <span class="detail-label">价格影响</span>
            <span class="detail-value">< 0.01%</span>
          </div>
          
          <div class="detail-item">
            <span class="detail-label">路由</span>
            <span class="detail-value">CFX → LOM</span>
          </div>
          
          <!-- 滑点容差部分 -->
          <div class="slippage-section">
            <div class="detail-item" style="border-bottom: none; padding: 0;">
              <span class="detail-label">滑点容差</span>
              <div class="slippage-controls">
                <div class="slip-btn active" data-slip="0.5">0.5%</div>
                <div class="slip-btn" data-slip="1">1%</div>
                <div class="slip-btn" data-slip="5">5%</div>
                <div class="slip-btn" data-slip="10">10%</div>
              </div>
            </div>
          </div>
        </div>
        
        <button class="action" id="swapBtn" disabled>请输入数量</button>
      </div>
    </div>

    <!-- 安全警告模态框 -->
    <div class="security-warning" id="securityWarning">
      <div class="security-warning-content">
        <div style="font-size: 48px; margin-bottom: 20px;">⚠️</div>
        <h3 style="color: var(--web3-warning); margin-bottom: 15px;">安全警告</h3>
        <p style="color: var(--web3-light); margin-bottom: 20px; line-height: 1.5;">
          您正在访问非官方域名：<strong id="currentDomain"></strong><br>
          请确认您访问的是官方网址，以防资产损失。
        </p>
        <div style="background: rgba(255, 107, 107, 0.1); padding: 15px; border-radius: 12px; margin-bottom: 20px;">
          <p style="font-size: 14px; color: var(--web3-light); margin: 0;">
            <strong>官方域名：</strong><br>
            lomswap.vercel.app<br>
            localhost
          </p>
        </div>
        <div class="security-buttons">
          <button class="security-btn continue" id="continueAnyway">仍然继续</button>
          <button class="security-btn close" id="closePage">关闭页面</button>
        </div>
      </div>
    </div>

    <script>
      // ==================== 安全防护模块 ====================
      const SECURITY_CONFIG = {
        ALLOWED_DOMAINS: ['lomswap.vercel.app', 'localhost']
      };

      // 安全验证函数
      function validateSecurity() {
        const currentDomain = window.location.hostname;
        const isAllowedDomain = SECURITY_CONFIG.ALLOWED_DOMAINS.some(domain => 
          currentDomain.includes(domain)
        );
        
        if (!isAllowedDomain) {
          showSecurityWarning(currentDomain);
          return false;
        }
        
        return true;
      }

      // 显示安全警告
      function showSecurityWarning(currentDomain) {
        const warning = document.getElementById('securityWarning');
        document.getElementById('currentDomain').textContent = currentDomain;
        warning.style.display = 'flex';
        
        // 绑定事件
        document.getElementById('continueAnyway').addEventListener('click', () => {
          warning.style.display = 'none';
          localStorage.setItem('securityWarningAcknowledged', 'true');
          initializeApp();
        });
        
        document.getElementById('closePage').addEventListener('click', () => {
          // 直接关闭窗口
          if (window.history.length > 1) {
            window.history.back();
          } else {
            window.close();
          }
        });
      }

      function initializeSecurity() {
        const warningAcknowledged = localStorage.getItem('securityWarningAcknowledged');
        
        if (!validateSecurity() && !warningAcknowledged) {
          return false;
        }
        
        document.getElementById('securityWarning').style.display = 'none';
        return true;
      }

      // ==================== 应用初始化 ====================
      function initializeApp() {
        setupTabs();
        setupPercentageButtons();
        setupTokenSelectors();
        setupSwapButton();
      }

      function setupTabs() {
        const tabBtns = document.querySelectorAll('.tab-btn');
        const tabContents = document.querySelectorAll('.tab-content');
        
        tabBtns.forEach(btn => {
          btn.addEventListener('click', () => {
            const tabId = btn.dataset.tab;
            
            tabBtns.forEach(b => b.classList.remove('active'));
            tabContents.forEach(c => c.classList.remove('active'));
            
            btn.classList.add('active');
            document.getElementById(tabId + 'Tab').classList.add('active');
          });
        });
      }

      function setupPercentageButtons() {
        document.querySelectorAll('.percent-btn').forEach(btn => {
          btn.addEventListener('click', function() {
            const percent = parseFloat(this.dataset.percent);
            handlePercentageClick(percent, this);
          });
        });
      }

      function setupTokenSelectors() {
        document.getElementById("fromTokenSelector").addEventListener("click", () => {
          alert('代币选择器 - 从代币');
        });
        
        document.getElementById("toTokenSelector").addEventListener("click", () => {
          alert('代币选择器 - 到代币');
        });
        
        document.getElementById("reverse").addEventListener("click", () => {
          swapTokens();
        });
      }

      function setupSwapButton() {
        const fromAmount = document.getElementById("fromAmount");
        const swapBtn = document.getElementById("swapBtn");
        
        fromAmount.addEventListener('input', () => {
          if (fromAmount.value && parseFloat(fromAmount.value) > 0) {
            swapBtn.disabled = false;
            swapBtn.innerText = "立即交换";
            // 模拟计算输出
            document.getElementById("toAmount").innerText = (parseFloat(fromAmount.value) * 0.5).toFixed(6);
          } else {
            swapBtn.disabled = true;
            swapBtn.innerText = "请输入数量";
            document.getElementById("toAmount").innerText = "0";
          }
        });
      }

      function handlePercentageClick(percent, button) {
        // 模拟百分比点击
        const amount = (10 * percent).toFixed(6);
        document.getElementById("fromAmount").value = amount;
        
        button.style.background = 'var(--web3-yellow)';
        button.style.color = '#000';
        setTimeout(() => {
          button.style.background = 'rgba(144, 224, 239, 0.1)';
          button.style.color = 'var(--web3-light)';
        }, 300);
        
        // 触发输入事件
        document.getElementById("fromAmount").dispatchEvent(new Event('input'));
      }

      function swapTokens() {
        const fromName = document.getElementById("fromTokenName");
        const toName = document.getElementById("toTokenName");
        const fromIcon = document.getElementById("fromTokenIcon");
        const toIcon = document.getElementById("toTokenIcon");
        
        const tempName = fromName.textContent;
        const tempIcon = fromIcon.textContent;
        
        fromName.textContent = toName.textContent;
        fromIcon.textContent = toIcon.textContent;
        toName.textContent = tempName;
        toIcon.textContent = tempIcon;
        
        // 重置输入
        document.getElementById("fromAmount").value = "";
        document.getElementById("toAmount").textContent = "0";
        document.getElementById("swapBtn").disabled = true;
        document.getElementById("swapBtn").innerText = "请输入数量";
        
        // 添加旋转动画
        const swapBtn = document.getElementById("reverse");
        swapBtn.style.transform = "translate(-50%, -50%) rotate(180deg)";
        setTimeout(() => {
          swapBtn.style.transform = "translate(-50%, -50%) rotate(0deg)";
        }, 300);
      }

      // ==================== 页面初始化 ====================
      document.addEventListener('DOMContentLoaded', function() {
        if (initializeSecurity()) {
          initializeApp();
        }
      });
    </script>
  </div>
</body>
</html>
