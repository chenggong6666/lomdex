<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>代币兑换卡片布局</title>
  <style>
    :root {
      --web3-blue: #4361ee;
      --web3-purple: #7209b7;
      --web3-yellow: #ffd166;
      --web3-dark: #0f172a;
      --web3-card: #1e293b;
      --web3-light: #90e0ef;
      --web3-accent: #4cc9f0;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      background: var(--web3-dark);
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    
    .token-input-wrapper {
      background: rgba(76, 201, 240, 0.05);
      border-radius: 20px;
      padding: 20px;
      border: 1px solid rgba(76, 201, 240, 0.2);
      transition: all 0.3s ease;
      position: relative;
      width: 100%;
      max-width: 450px;
      margin: 0 auto;
    }
    
    .token-selector {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    
    .token-selector-left {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
    }
    
    .token-logo {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 16px;
      flex-shrink: 0;
      cursor: pointer;
      border: 2px solid rgba(76, 201, 240, 0.3);
    }
    
    .token-name {
      font-size: 18px;
      font-weight: bold;
      color: var(--web3-light);
      cursor: pointer;
    }
    
    .token-balance {
      font-size: 14px;
      color: #94a3b8;
      text-align: right;
      white-space: nowrap;
    }
    
    .token-amount {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .amount-input {
      background: transparent;
      border: 1px solid rgba(76, 201, 240, 0.3);
      border-radius: 12px;
      color: white;
      font-size: 28px;
      font-weight: bold;
      text-align: right;
      width: 100%;
      outline: none;
      padding: 12px 16px;
      min-height: 60px;
      transition: all 0.3s ease;
    }
    
    .amount-input:focus {
      border-color: var(--web3-accent);
      box-shadow: 0 0 0 2px rgba(76, 201, 240, 0.2);
    }
    
    .amount-display {
      background: transparent;
      border: 1px solid rgba(76, 201, 240, 0.3);
      border-radius: 12px;
      color: #94a3b8;
      font-size: 28px;
      font-weight: bold;
      text-align: right;
      width: 100%;
      padding: 12px 16px;
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
    }
    
    .percentage-buttons {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 16px;
    }
     
    .percent-btn {
      background: rgba(144, 224, 239, 0.1);
      border: 1px solid rgba(76, 201, 240, 0.3);
      border-radius: 12px;
      padding: 10px 0;
      color: var(--web3-light);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      flex: 1;
      text-align: center;
    }
    
    .percent-btn:hover, .percent-btn.active {
      background: var(--web3-yellow);
      color: #0f172a;
      border-color: var(--web3-yellow);
    }
    
    .swap-center {
      position: relative;
      height: 40px;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 8px 0;
      width: 100%;
      z-index: 10;
    }
    
    .swap-arrow {
      background: var(--web3-card);
      width: 50px;
      height: 50px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      cursor: pointer;
      border: 1px solid rgba(76, 201, 240, 0.3);
      transition: all 0.3s ease;
      color: var(--web3-light);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }
    
    .swap-arrow:hover {
      background: rgba(76, 201, 240, 0.1);
      border-color: var(--web3-accent);
      box-shadow: 0 4px 12px rgba(76, 201, 240, 0.2);
      color: var(--web3-accent);
      transform: translateY(-2px);
    }
    
    .token-input-group {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 16px;
    }
    
    /* 模态框样式 */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.95);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      backdrop-filter: blur(5px);
      padding: 20px;
    }
    
    .modal-card {
      background: var(--web3-card);
      border-radius: 24px;
      padding: 24px;
      width: 100%;
      max-width: 420px;
      border: 1px solid rgba(76, 201, 240, 0.3);
      max-height: 90vh;
      overflow-y: auto;
    }
    
    .modal-title {
      margin: 0 0 20px;
      color: var(--web3-light);
      text-align: center;
      font-size: 20px;
    }
    
    .token-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 20px;
    }
    
    .token-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px;
      background: rgba(76, 201, 240, 0.05);
      border-radius: 16px;
      border: 1px solid rgba(76, 201, 240, 0.2);
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .token-item:hover {
      background: rgba(76, 201, 240, 0.1);
      transform: translateY(-2px);
    }
    
    .token-item-logo {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }
    
    .token-item-info {
      flex: 1;
    }
    
    .token-item-name {
      font-size: 16px;
      font-weight: 600;
      color: var(--web3-light);
    }
    
    .token-item-balance {
      font-size: 14px;
      color: #94a3b8;
    }
    
    .action {
      background: linear-gradient(90deg, var(--web3-blue), var(--web3-purple));
      color: #fff;
      font-weight: 700;
      padding: 18px;
      border: none;
      border-radius: 20px;
      width: 100%;
      font-size: 18px;
      cursor: pointer;
      margin-top: 20px;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    
    .action:hover {
      transform: translateY(-3px);
    }
    
    .action:disabled {
      background: #475569;
      color: #94a3b8;
      cursor: not-allowed;
      transform: none;
    }
    
    .demo-title {
      text-align: center;
      margin-bottom: 30px;
      font-size: 24px;
      color: var(--web3-light);
    }
    
    .demo-subtitle {
      text-align: center;
      margin-bottom: 40px;
      color: #94a3b8;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <div>
    <h1 class="demo-title">代币兑换卡片布局</h1>
    <p class="demo-subtitle">独立提取的兑换卡片组件，包含代币Logo、输入框和余额显示</p>
    
    <div class="token-input-group">
      <!-- 上方输入框 -->
      <div class="token-input-wrapper">
        <div class="percentage-buttons">
          <button class="percent-btn" data-percent="0.1">10%</button>
          <button class="percent-btn" data-percent="0.25">25%</button>
          <button class="percent-btn" data-percent="0.5">50%</button>
          <button class="percent-btn" data-percent="0.75">75%</button>
          <button class="percent-btn" data-percent="1">MAX</button>
        </div>
        
        <div class="token-selector">
          <div class="token-selector-left">
            <div class="token-logo" id="fromTokenLogo" style="background-image: url('https://i.imgur.com/70cXbUI.jpeg');"></div>
            <div class="token-name" id="fromTokenName">CFX</div>
          </div>
          <div class="token-balance">余额: <span id="fromBal">12.456789</span></div>
        </div>
        <div class="token-amount">
          <input class="amount-input" id="fromAmount" placeholder="0" type="number" min="0" step="any">
        </div>
      </div>
      
      <!-- 中间转换按钮 -->
      <div class="swap-center">
        <div class="swap-arrow" id="reverse">⇅</div>
      </div>
      
      <!-- 下方输入框 -->
      <div class="token-input-wrapper">
        <div class="token-selector">
          <div class="token-selector-left">
            <div class="token-logo" id="toTokenLogo" style="background-image: url('https://i.imgur.com/HddyTrv.jpeg');"></div>
            <div class="token-name" id="toTokenName">LOM</div>
          </div>
          <div class="token-balance">余额: <span id="toBal">2456.123456</span></div>
        </div>
        <div class="token-amount">
          <div class="amount-display" id="toAmount">0</div>
        </div>
      </div>
    </div>
    
    <button class="action" id="swapBtn">兑换</button>
  </div>

  <!-- 代币选择模态框 -->
  <div class="modal" id="tokenSelectModal">
    <div class="modal-card">
      <h3 class="modal-title">选择代币</h3>
      <div class="token-list" id="tokenList">
        <!-- 代币列表会通过JS动态生成 -->
      </div>
      <button class="action" onclick="closeTokenSelector()">关闭</button>
    </div>
  </div>

  <script>
    // 代币配置
    const TOKENS = [
      {
        symbol: "CFX",
        name: "Conflux",
        logo: "https://i.imgur.com/70cXbUI.jpeg",
        balance: "12.456789"
      },
      {
        symbol: "LOM",
        name: "LongMai",
        logo: "https://i.imgur.com/HddyTrv.jpeg",
        balance: "2456.123456"
      },
      {
        symbol: "AxCNH",
        name: "AxCNH",
        logo: "",
        balance: "0.000000"
      },
      {
        symbol: "USDT0",
        name: "Tether USD",
        logo: "",
        balance: "150.750000"
      },
      {
        symbol: "CNHT0",
        name: "CNHT",
        logo: "",
        balance: "0.000000"
      }
    ];

    let fromToken = "CFX";
    let toToken = "LOM";
    let selectedTokenType = null; // 'from' 或 'to'

    // 初始化
    document.addEventListener('DOMContentLoaded', function() {
      setupTokenSelectors();
      populateTokenList();
      setupPercentageButtons();
      setupSwapButton();
    });

    // 设置代币选择器
    function setupTokenSelectors() {
      document.getElementById('fromTokenLogo').addEventListener('click', function() {
        selectedTokenType = 'from';
        openTokenSelector();
      });
      
      document.getElementById('fromTokenName').addEventListener('click', function() {
        selectedTokenType = 'from';
        openTokenSelector();
      });
      
      document.getElementById('toTokenLogo').addEventListener('click', function() {
        selectedTokenType = 'to';
        openTokenSelector();
      });
      
      document.getElementById('toTokenName').addEventListener('click', function() {
        selectedTokenType = 'to';
        openTokenSelector();
      });
    }

    function openTokenSelector() {
      document.getElementById('tokenSelectModal').style.display = 'flex';
    }

    function closeTokenSelector() {
      document.getElementById('tokenSelectModal').style.display = 'none';
    }

    function populateTokenList() {
      const tokenList = document.getElementById('tokenList');
      tokenList.innerHTML = '';
      
      TOKENS.forEach(token => {
        const tokenItem = document.createElement('div');
        tokenItem.className = 'token-item';
        tokenItem.innerHTML = `
          <div class="token-item-logo" style="background-image: url('${token.logo}'); ${!token.logo ? 'background: linear-gradient(135deg, #4361ee, #7209b7);' : ''}">
            ${!token.logo ? token.symbol.charAt(0) : ''}
          </div>
          <div class="token-item-info">
            <div class="token-item-name">${token.symbol}</div>
            <div class="token-item-balance">${token.balance}</div>
          </div>
        `;
        
        tokenItem.addEventListener('click', () => {
          selectToken(token.symbol);
        });
        
        tokenList.appendChild(tokenItem);
      });
    }

    function selectToken(symbol) {
      const token = TOKENS.find(t => t.symbol === symbol);
      if (!token) return;
      
      if (selectedTokenType === 'from') {
        fromToken = symbol;
        updateTokenDisplay('from', token);
      } else if (selectedTokenType === 'to') {
        toToken = symbol;
        updateTokenDisplay('to', token);
      }
      
      // 防止选择相同的代币
      if (fromToken === toToken) {
        const otherTokens = TOKENS.filter(t => t.symbol !== symbol);
        if (otherTokens.length > 0) {
          if (selectedTokenType === 'from') {
            toToken = otherTokens[0].symbol;
            updateTokenDisplay('to', otherTokens[0]);
          } else {
            fromToken = otherTokens[0].symbol;
            updateTokenDisplay('from', otherTokens[0]);
          }
        }
      }
      
      closeTokenSelector();
      updateOutput();
    }

    function updateTokenDisplay(type, token) {
      const logoElement = document.getElementById(`${type}TokenLogo`);
      const nameElement = document.getElementById(`${type}TokenName`);
      const balanceElement = document.getElementById(`${type === 'from' ? 'fromBal' : 'toBal'}`);
      
      if (logoElement) {
        if (token.logo) {
          logoElement.style.backgroundImage = `url('${token.logo}')`;
          logoElement.textContent = '';
        } else {
          logoElement.style.backgroundImage = '';
          logoElement.style.background = 'linear-gradient(135deg, #4361ee, #7209b7)';
          logoElement.textContent = token.symbol.charAt(0);
        }
      }
      
      if (nameElement) nameElement.textContent = token.symbol;
      if (balanceElement) balanceElement.textContent = token.balance;
    }

    // 设置百分比按钮
    function setupPercentageButtons() {
      document.querySelectorAll('.percent-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          // 移除其他按钮的active类
          document.querySelectorAll('.percent-btn').forEach(b => b.classList.remove('active'));
          // 添加当前按钮的active类
          this.classList.add('active');
          
          const percent = parseFloat(this.dataset.percent);
          handlePercentageClick(percent);
        });
      });
    }

    function handlePercentageClick(percent) {
      const balance = parseFloat(document.getElementById("fromBal").textContent);
      
      if (balance > 0) {
        let amount;
        
        if (percent === 1) {
          // MAX按钮 - 保留少量余额作为gas费
          amount = Math.max(0, balance - 0.1);
        } else {
          amount = balance * percent;
        }
        
        if (amount > 0) {
          document.getElementById("fromAmount").value = amount.toFixed(6);
          updateOutput();
        }
      }
    }

    // 设置兑换按钮
    function setupSwapButton() {
      document.getElementById("fromAmount").addEventListener('input', updateOutput);
      
      document.getElementById("reverse").addEventListener('click', () => {
        // 交换代币
        const tempToken = fromToken;
        fromToken = toToken;
        toToken = tempToken;
        
        // 更新显示
        const fromTokenData = TOKENS.find(t => t.symbol === fromToken);
        const toTokenData = TOKENS.find(t => t.symbol === toToken);
        
        if (fromTokenData) updateTokenDisplay('from', fromTokenData);
        if (toTokenData) updateTokenDisplay('to', toTokenData);
        
        // 交换输入框的值
        const fromAmount = document.getElementById("fromAmount").value;
        const toAmount = document.getElementById("toAmount").textContent;
        
        if (fromAmount && fromAmount !== "0" && fromAmount !== "") {
          document.getElementById("fromAmount").value = toAmount;
        } else {
          document.getElementById("fromAmount").value = "";
        }
        
        updateOutput();
      });
    }

    // 更新输出
    function updateOutput() {
      const amt = document.getElementById("fromAmount").value;
      
      if (!amt || amt === "0" || amt === "") { 
        document.getElementById("toAmount").textContent = "0";
        document.getElementById("swapBtn").disabled = true;
        return; 
      }
      
      // 简单的兑换计算示例
      const amount = parseFloat(amt);
      let output = 0;
      
      if (fromToken === "CFX" && toToken === "LOM") {
        output = amount * 150; // 假设汇率
      } else if (fromToken === "LOM" && toToken === "CFX") {
        output = amount / 150; // 假设汇率
      } else {
        // 其他代币的简单计算
        output = amount * 1.5;
      }
      
      document.getElementById("toAmount").textContent = output.toFixed(6);
      document.getElementById("swapBtn").disabled = false;
    }

    // 模态框关闭事件
    window.onclick = e => { 
      if(e.target.classList.contains("modal")) {
        e.target.style.display = "none";
      }
    };
  </script>
</body>
</html>
